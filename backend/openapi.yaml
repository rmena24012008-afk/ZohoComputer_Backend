  # ════════════════════════════════════════════════════════════
  # CHAT (SSE Streaming)
  # ════════════════════════════════════════════════════════════

  /api/chat/{sessionId}/send:
    parameters:
      - name: sessionId
        in: path
        required: true
        schema:
          type: integer
          format: int64
        description: Chat session ID
        example: 42

    post:
      tags: [Chat]
      summary: Send a message and stream AI response (SSE)
      operationId: sendChatMessage
      description: |
        Sends a user message to the AI agent and returns a **Server-Sent Events (SSE)**
        stream with the response. The connection stays open until the AI finishes
        responding.

        ### SSE Event Types

        | Event | Data Schema | Description |
        |-------|-------------|-------------|
        | `thinking` | `{"content": "..."}` | AI reasoning/thinking text |
        | `iteration` | `{"iteration": 1, "tool": "..."}` | Tool use iteration |
        | `token` | `{"content": "..."}` | Incremental response text token |
        | `done` | `{"message_id": 102, "session_title": "..."}` | Stream complete |
        | `error` | `{"error": "..."}` | Error occurred during processing |

        ### Side Effects
        - The user message is saved to the database before streaming begins
        - The full assistant response is saved after streaming completes
        - If this is the first message in a session titled "New conversation",
          the title is auto-updated from the user's message (truncated at 50 chars)

        ### Timeout
        The async context has a 5-minute (300,000ms) timeout.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatSendRequest'
      responses:
        '200':
          description: SSE stream of AI response events
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  Server-Sent Events stream. Each event has the format:
                  ```
                  event: <event_type>
                  data: <json_data>
                  ```
              examples:
                full_stream:
                  summary: Example SSE stream
                  value: |
                    event: thinking
                    data: {"content":"Let me analyze your request..."}

                    event: token
                    data: {"content":"Here"}

                    event: token
                    data: {"content":" is"}

                    event: token
                    data: {"content":" the"}

                    event: token
                    data: {"content":" solution."}

                    event: done
                    data: {"message_id":102,"session_title":"Create a Python script..."}
        '400':
          description: Invalid endpoint, missing session ID, or empty message
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                bad_endpoint:
                  value: { success: false, error: "Invalid chat endpoint. Use /api/chat/{sessionId}/send" }
                missing_message:
                  value: { success: false, error: "Message is required" }
        '401':
          description: Missing or invalid authentication token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Session not found or does not belong to user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

